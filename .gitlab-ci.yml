stages:
  - install
  - test
  - sast
  - build
  - deploy_local
  - terraform_plan

default:
  tags:
    

variables:
  GIT_STRATEGY: clone
  CI_REPOSITORY_URL: https://oauth2:${GITHUB_TOKEN}@github.com/imanehadi/secnotes-vuln-app.git
  APP_NAME: "secnotes"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  SONAR_HOST_URL: "http://172.17.0.1:9000"

# ============================================
# ÉTAPE 1: Installation des dépendances
# ============================================
install_dependencies:
  stage: install
  script:
    - echo "[install] Installation des dépendances..."
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

# ============================================
# ÉTAPE 2: Tests unitaires
# ============================================
run_tests:
  stage: test
  dependencies:
    - install_dependencies
  script:
    - echo "[test] Exécution des tests Jest..."
    - npm test
  allow_failure: true
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

# ============================================
# ÉTAPE 3: SAST avec SonarQube
# ============================================
sonarqube_scan:
  stage: sast
  dependencies:
    - install_dependencies
  before_script:
    - echo "[sast] Installation de SonarScanner..."
    - npm install -g sonarqube-scanner
  script:
    - echo "[sast] Analyse SonarQube..."
    - sonar-scanner
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_TOKEN
      -Dsonar.projectKey=secnotes-vuln-app
      -Dsonar.projectName="SecNotes Vulnerable App"
      -Dsonar.sources=src
      -Dsonar.tests=tests
      -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - .scannerwork/
    expire_in: 1 week
  allow_failure: true

# ============================================
# ÉTAPE 4: Build Docker
# ============================================
docker_build:
  stage: build
  script:
    - echo "[build] Construction de l'image Docker..."
    - docker build -t $APP_NAME:$IMAGE_TAG .
    - docker tag $APP_NAME:$IMAGE_TAG $APP_NAME:latest
    - docker save $APP_NAME:$IMAGE_TAG -o image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  allow_failure: true

# ============================================
# ÉTAPE 5: Déploiement Kubernetes local
# ============================================
deploy_k8s_local:
  stage: deploy_local
  only:
    - main
  script:
    - echo "[deploy] Déploiement local sur Kubernetes..."
    - kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
    - echo "Namespace dev créé"
    - kubectl get pods -n dev
    - kubectl get svc -n dev
  allow_failure: true

# ============================================
# ÉTAPE 6: Terraform AWS
# ============================================
terraform_plan:
  stage: terraform_plan
  only:
    - main
  when: manual
  script:
    - echo "[terraform] Préparation du plan AWS..."
    - cd terraform
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - terraform/tfplan
    expire_in: 1 day
  allow_failure: true