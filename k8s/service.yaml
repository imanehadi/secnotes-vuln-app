apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: secnotes
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: secnotes-service
  namespace: secnotes
spec:
  type: NodePort
  selector:
    app: secnotes-app
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
